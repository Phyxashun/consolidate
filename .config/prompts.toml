id = "PROMPTS"
name = "prompts.toml"
description = "Contains prompts used by the user interface."

[[prompts]]
id = "summarize_text"
name = "Summarize Text"
description = "Condenses long text into key bullet points."
category = "General"
prompt = """
Summarize the following text into 3-5 bullet points:

{{input}}"""

[prompts.parameters]
temperature = 0.3
max_tokens = 150

[[prompts]]
id = "debug_code"
name = "Debug Code"
description = "Analyzes code for errors and suggests fixes."
category = "Developer"
prompt = """
Review the following code for bugs and provide a corrected version with a brief explanation of the issue:

{{input}}"""

[prompts.parameters]
temperature = 0.1
max_tokens = 500

